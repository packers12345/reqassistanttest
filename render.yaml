services:
  - type: web
    name: incose-analyzer
    runtime: python
    buildCommand: |
      pip install -r backend/requirements.txt &&
      cd frontend && npm install && npx vite build
    startCommand: cd backend && uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      - key: NODE_VERSION
        value: "20"
      # Playwright is a dev dependency used by the E2E suite. The build runs a
      # plain `npm install` (vite itself is a dev dependency, so --omit=dev is
      # not an option), which would otherwise pull ~150MB of browsers that the
      # server never uses.
      - key: PLAYWRIGHT_SKIP_BROWSER_DOWNLOAD
        value: "1"
      # Which provider the app defaults to. Must be one the keys below cover.
      - key: AI_PROVIDER
        value: anthropic
      # Set these in the Render dashboard (Environment tab) — sync: false keeps
      # the secret out of the repo while still requiring it at deploy time.
      # End users never enter a key; all analysis runs on these.
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      # Shared code required to use the app. Without it the URL is open to
      # anyone who finds it, spending the keys above. Also set in the dashboard.
      - key: ACCESS_CODE
        sync: false
